# D2R Tracker 경로 설정 파일
# 실행 파일(exe) 기준 상대 경로로 지정
# ~ 는 사용자 홈 디렉토리를 의미
# 변경 후 앱 재시작 필요

# ── 앱 설정 파일 ─────────────────────────────────────────────
config.file       = tracker_config.json
ai_keys.file      = tracker_config_keys.json

# ── Node.js OCR ───────────────────────────────────────────────
node.exe          = node/node.exe
node_worker.file  = node_worker/ocr_worker.js

# ── 아이템 데이터 ─────────────────────────────────────────────
data.dir          = data
tessdata.dir      = tessdata

# ── 캡처 이미지 저장 (log.root 기준 하위 경로) ────────────────
captures.subdir   = D2R_Tracker/captures
captures.filename = cap_latest.png

# ── 로그 파일 저장 ────────────────────────────────────────────
# log.root: 기본 저장 루트 (홈 디렉토리 이하 경로 권장)
log.root          = ~/Documents

# ── 아이콘 ───────────────────────────────────────────────────
icon.file         = icon.ico

# ── AI 모델명 ─────────────────────────────────────────────────
ai.model.groq     = meta-llama/llama-4-scout-17b-16e-instruct

# ── 기초 데이터 GitHub 저장소 ─────────────────────────────────
# raw 파일을 직접 받을 수 있는 base URL (끝에 / 포함)
github.data.url   = https://raw.githubusercontent.com/diuno88/d2r_kain/main/

# 다운로드할 파일 목록 (쉼표 구분)
github.data.files = baseItemList.json,craftedResult.json,d2r_affixes_detailed.json,item-category.json,ladderSeason.json,optionCombo.json,runWordsResult.json,setItemList.json,uniqueResult.json

# ── 유료 키 인증 ─────────────────────────────────────────────
# 원본 키는 올리지 않고 SHA-256 해시값만 공개로 호스팅 (매월 갱신)
#github.premium_key.url = https://raw.githubusercontent.com/diuno88/d2r_kain/main/premium_keys.json
